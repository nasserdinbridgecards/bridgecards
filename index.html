<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BridgeCards – جسر الكروت | المنصة المتكاملة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* كل التنسيقات الأصلية محفوظة كما هي لضمان المظهر الاحترافي */
:root{
  --bg:#07080f;--bg2:#0d0e1a;--surface:#111220;--card:#161728;
  --border:#252740;--border2:#2e3155;
  --accent:#3d6bff;--accent2:#ff4f7b;--accent3:#00d4aa;--gold:#ffbe00;
  --text:#eef0ff;--sub:#9294b8;
  --r:14px;--rsm:8px;--rpill:100px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;overflow-x:hidden;min-height:100vh;}
[dir=ltr]{font-family:'Sora',sans-serif;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 800px 600px at 10% 20%,rgba(61,107,255,.07),transparent 70%),
             radial-gradient(ellipse 600px 500px at 90% 80%,rgba(255,79,123,.06),transparent 70%),
             linear-gradient(rgba(61,107,255,.025) 1px,transparent 1px),
             linear-gradient(90deg,rgba(61,107,255,.025) 1px,transparent 1px);
  background-size:auto,auto,52px 52px,52px 52px;}

/* نيفبار وتنسيقات القوائم */
.topbar{background:linear-gradient(90deg,var(--accent),var(--accent2));padding:8px;text-align:center;font-size:13px;font-weight:700;position:relative;z-index:200;}
nav{position:sticky;top:0;z-index:150;background:rgba(7,8,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:66px;display:flex;align-items:center;padding:0 16px;gap:10px;overflow:visible;}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text{font-size:16px;font-weight:900;color:var(--text);}
.logo-text small{display:block;font-size:10px;color:var(--sub);line-height:1;}
.nav-cats{display:flex;gap:1px;flex:1;justify-content:center;list-style:none;min-width:0;overflow:hidden;}
.nav-cat{position:relative;}
.nav-cat>a{padding:5px 8px;border-radius:var(--rsm);color:var(--sub);text-decoration:none;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .2s;white-space:nowrap;}
.nav-cat>a:hover,.nav-cat.open>a{color:var(--text);background:rgba(255,255,255,.05);}
.chev{font-size:9px;opacity:.6;transition:transform .2s;}
.nav-cat.open .chev{transform:rotate(180deg);}
.drop{display:none;position:fixed;top:66px;left:0;right:0;background:rgba(9,9,20,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);z-index:140;padding:24px 32px 28px;animation:fadeDown .2s ease;}
.nav-cat.open .drop{display:block;}

/* ستايل الكروت والمحتوى */
.sec{position:relative;z-index:1;max-width:1200px;margin:0 auto 64px;padding:0 24px;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px;}
.pc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .22s;display:flex;flex-direction:column;}
.pc:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 14px 36px rgba(61,107,255,.18);}
.pc-head{height:120px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:12px;}
.pc-logo-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; }
.pc-body{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;}
.pc-name{font-size:13px;font-weight:800;margin-bottom:3px;}
.pc-price{font-size:15px;font-weight:900;color:var(--accent3);line-height:1.2;}
.add-btn{padding:5px 12px;border:none;border-radius:var(--rsm);background:var(--accent);color:#fff;font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;}
.add-btn:hover{background:#2f5ae0;transform:scale(1.05);}

/* بقية التنسيقات (تم الحفاظ عليها بالكامل من كودك الأصلي) */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:20px 0;}
.tab{padding:7px 14px;border-radius:var(--rsm);border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:12px;font-weight:700;}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.toast{position:fixed;bottom:22px;inset-inline-end:22px;z-index:600;background:var(--accent3);color:#07080f;font-size:13px;font-weight:800;padding:10px 16px;border-radius:9px;transform:translateY(60px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <div class="logo-icon">🌉</div>
    <div class="logo-text">BridgeCards<small id="logo-sub">جسر الكروت</small></div>
  </a>
  <div style="margin-inline-start: auto; display: flex; gap: 10px;">
    <button class="add-btn" onclick="toggleLang()">🌐 <span id="lang-lbl">EN</span></button>
  </div>
</nav>

<div class="sec">
  <div class="tabs" id="filterTabs">
    <button class="tab on" onclick="filterTab(this,'all')">الكل</button>
    <button class="tab" onclick="filterTab(this,'game')">ألعاب</button>
    <button class="tab" onclick="filterTab(this,'gift')">هدايا</button>
    <button class="tab" onclick="filterTab(this,'prepaid')">مسبقة الدفع</button>
    <button class="tab" onclick="filterTab(this,'crypto')">كريبتو</button>
    <button class="tab" onclick="filterTab(this,'fashion')">أزياء</button>
  </div>
  <div class="pgrid" id="pgrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- إعدادات النظام ---
let lang = 'ar';
let currentFilter = 'all';
const PROFIT_MARGIN = 1.10;

// --- قاعدة البيانات الكاملة (تمت مراجعة كل الكروت واستعادتها) ---
const P = [
  // ألعاب
  {id:'steam',cat:'game',icon:'🎮',bg:'#1b2838',name:{ar:'Steam Wallet',en:'Steam Wallet'},price:10},
  {id:'psn',cat:'game',icon:'💙',bg:'#003087',name:{ar:'PlayStation',en:'PlayStation'},price:20},
  {id:'xbox',cat:'game',icon:'💚',bg:'#107c10',name:{ar:'Xbox Gift',en:'Xbox Gift'},price:15},
  {id:'pubg',cat:'game',icon:'🔫',bg:'#1a1a1a',name:{ar:'PUBG Mobile UC',en:'PUBG UC'},price:5},
  {id:'roblox',cat:'game',icon:'🧱',bg:'#cc0000',name:{ar:'Roblox',en:'Roblox'},price:10},
  {id:'fortnite',cat:'game',icon:'🏆',bg:'#1900ff',name:{ar:'Fortnite V-Bucks',en:'Fortnite'},price:8},
  {id:'nintendo',cat:'game',icon:'🍄',bg:'#e60012',name:{ar:'Nintendo eShop',en:'Nintendo'},price:10},
  {id:'freefire',cat:'game',icon:'🔥',bg:'#1a0a2e',name:{ar:'Free Fire',en:'Free Fire'},price:2},
  // هدايا
  {id:'amazon',cat:'gift',icon:'📦',bg:'#ff9900',name:{ar:'Amazon Card',en:'Amazon'},price:25},
  {id:'apple',cat:'gift',icon:'🍎',bg:'#555',name:{ar:'Apple Store',en:'App Store'},price:10},
  {id:'google',cat:'gift',icon:'🤖',bg:'#4285f4',name:{ar:'Google Play',en:'Google Play'},price:10},
  {id:'netflix',cat:'gift',icon:'🎬',bg:'#e50914',name:{ar:'Netflix Card',en:'Netflix'},price:15},
  {id:'spotify',cat:'gift',icon:'🎵',bg:'#1db954',name:{ar:'Spotify',en:'Spotify'},price:10},
  {id:'ebay',cat:'gift',icon:'🛒',bg:'#0064d2',name:{ar:'eBay Card',en:'eBay'},price:20},
  // مسبقة الدفع
  {id:'visa',cat:'prepaid',icon:'💳',bg:'#1a1f71',name:{ar:'Visa Prepaid',en:'Visa'},price:50},
  {id:'mastercard',cat:'prepaid',icon:'🎴',bg:'#eb001b',name:{ar:'Mastercard',en:'Mastercard'},price:50},
  {id:'astropay',cat:'prepaid',icon:'🌐',bg:'#003087',name:{ar:'AstroPay',en:'AstroPay'},price:10},
  // كريبتو
  {id:'binance',cat:'crypto',icon:'🟡',bg:'#f3ba2f',name:{ar:'Binance Card',en:'Binance'},price:100},
  {id:'usdt',cat:'crypto',icon:'💵',bg:'#26a17b',name:{ar:'USDT Card',en:'USDT'},price:10},
  {id:'btc',cat:'crypto',icon:'₿',bg:'#f7931a',name:{ar:'Bitcoin BTC',en:'Bitcoin'},price:50},
  // أزياء وتسوق
  {id:'zara',cat:'fashion',icon:'👗',bg:'#000',name:{ar:'Zara Gift',en:'Zara'},price:30},
  {id:'hm',cat:'fashion',icon:'👕',bg:'#cc0000',name:{ar:'H&M Card',en:'H&M'},price:25},
  {id:'nike',cat:'fashion',icon:'👟',bg:'#111',name:{ar:'Nike Card',en:'Nike'},price:50},
  {id:'walmart',cat:'retail',icon:'🏬',bg:'#0071ce',name:{ar:'Walmart',en:'Walmart'},price:20},
  {id:'target',cat:'retail',icon:'🎯',bg:'#cc0000',name:{ar:'Target',en:'Target'},price:15},
  {id:'noon',cat:'retail',icon:'🌕',bg:'#feee00',name:{ar:'Noon Card',en:'Noon'},price:50}
];

// --- وظائف العرض ---
function renderProducts() {
  const grid = document.getElementById('pgrid');
  const list = currentFilter === 'all' ? P : P.filter(p => p.cat === currentFilter);
  
  grid.innerHTML = list.map(p => `
    <div class="pc">
      <div class="pc-head" style="background:${p.bg}">
        <div class="pc-logo-container">${p.icon}</div>
      </div>
      <div class="pc-body">
        <div class="pc-name">${p.name[lang]}</div>
        <div class="pc-price">$${(p.price * PROFIT_MARGIN).toFixed(2)}</div>
        <button class="add-btn" onclick="showToast('${lang==='ar'?'تمت الإضافة!':'Added!'}')">
          ${lang==='ar'?'أضف للسلة +':'Add +'}
        </button>
      </div>
    </div>
  `).join('');
}

function filterTab(btn, cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  currentFilter = cat;
  renderProducts();
}

function toggleLang() {
  lang = lang === 'ar' ? 'en' : 'ar';
  document.getElementById('htmlRoot').dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('lang-lbl').textContent = lang === 'ar' ? 'EN' : 'AR';
  renderProducts();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// تشغيل النظام فور التحميل
renderProducts();
</script>
</body>
</html>
