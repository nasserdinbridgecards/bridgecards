<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgeCards – جسر الكروت | منصة البطاقات الرقمية الأولى</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07080f; --bg2: #0d0e1a; --surface: #111220; --card: #161728;
            --border: #252740; --border2: #2e3155;
            --accent: #3d6bff; --accent2: #ff4f7b; --accent3: #00d4aa; --gold: #ffbe00;
            --text: #eef0ff; --sub: #9294b8;
            --r: 14px; --rsm: 8px; --rpill: 100px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        html { scroll-behavior: smooth; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; 
            overflow-x: hidden; min-height: 100vh; line-height: 1.6;
        }

        /* Background Glow Effect */
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse 800px 600px at 10% 20%, rgba(61, 107, 255, .08), transparent 70%),
                        radial-gradient(ellipse 600px 500px at 90% 80%, rgba(255, 79, 123, .07), transparent 70%);
        }

        .topbar { 
            background: linear-gradient(90deg, var(--accent), var(--accent2)); 
            padding: 8px; text-align: center; font-size: 13px; font-weight: 700; color: #fff;
            position: relative; z-index: 200; 
        }

        nav { 
            position: sticky; top: 0; z-index: 150; height: 70px;
            background: rgba(7, 8, 15, 0.85); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 5%;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
        .logo-icon { 
            width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--accent2)); 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; 
        }
        .logo-text { font-size: 18px; font-weight: 900; }
        .logo-text small { display: block; font-size: 10px; color: var(--sub); opacity: 0.8; }

        .nav-right { margin-inline-start: auto; display: flex; gap: 12px; }
        .btn-ui {
            background: var(--surface); border: 1px solid var(--border2); color: var(--text);
            padding: 8px 16px; border-radius: var(--rsm); cursor: pointer; font-weight: 700;
            font-size: 13px; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-ui:hover { border-color: var(--accent); background: var(--card); }

        /* Products Grid */
        .sec { max-width: 1200px; margin: 50px auto; padding: 0 20px; position: relative; z-index: 1; }
        .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        
        .pc { 
            background: var(--card); border: 1px solid var(--border); border-radius: var(--r); 
            overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column;
        }
        .pc:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }

        .pc-head { 
            height: 150px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; 
        }
        .pc-icon-large { font-size: 55px; z-index: 2; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .pc-head::after {
            content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.4));
        }

        .pc-body { padding: 20px; flex: 1; display: flex; flex-direction: column; text-align: center; }
        .pc-name { font-size: 17px; font-weight: 800; margin-bottom: 8px; }
        .pc-price { font-size: 22px; font-weight: 900; color: var(--accent3); margin-bottom: 15px; }

        .add-btn { 
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #2f5ae0); color: #fff; 
            font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Cairo';
        }
        .add-btn:hover { box-shadow: 0 5px 15px rgba(61, 107, 255, 0.4); transform: scale(1.02); }

        /* Cart Drawer */
        .cart-dr {
            position: fixed; top: 0; right: -420px; width: 400px; max-width: 90vw; height: 100vh;
            background: var(--surface); border-left: 1px solid var(--border);
            z-index: 500; transition: 0.4s ease-in-out; padding: 25px; display: flex; flex-direction: column;
        }
        .cart-dr.open { right: 0; }
        .cart-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 499; display: none; backdrop-filter: blur(4px); }
        .cart-ov.open { display: block; }

        /* Toast Notifications */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--accent3); color: #000; padding: 14px 28px; border-radius: 50px;
            font-weight: 900; z-index: 1000; transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media (max-width: 600px) {
            nav { padding: 0 15px; }
            .logo-text { font-size: 15px; }
            .pgrid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="topbar">🚀 تسليم فوري للأكواد الرقمية | دعم فني على مدار الساعة</div>

<nav>
    <a href="#" class="logo">
        <div class="logo-icon">🌉</div>
        <div class="logo-text">BridgeCards<small>منصة البطاقات الموثوقة</small></div>
    </a>

    <div class="nav-right">
        <button class="btn-ui" onclick="toggleLang()">🌐 <span id="lang-lbl">EN</span></button>
        <button class="btn-ui" onclick="openCart()">🛒 <span id="cart-nav-total">$0.00</span></button>
    </div>
</nav>

<section class="sec">
    <div style="text-align: center; margin-bottom: 50px;">
        <h1 style="font-size: 38px; font-weight: 900; margin-bottom: 12px;">متجر <span style="color: var(--accent);">جسر الكروت</span></h1>
        <p style="color: var(--sub); max-width: 500px; margin: 0 auto;">اختر بطاقتك المفضلة واستلم الكود فوراً في بريدك الإلكتروني بعد الدفع.</p>
    </div>

    <div class="pgrid" id="pgrid">
        </div>
</section>

<div class="cart-ov" id="cartOv" onclick="closeCart()"></div>
<div class="cart-dr" id="cartDr">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="font-size: 20px;">🛒 سلة المشتريات</h2>
        <button onclick="closeCart()" style="background:none; border:none; color:var(--sub); cursor:pointer; font-size: 20px;">✕</button>
    </div>
    <div id="cartList" style="flex:1; overflow-y:auto; padding-right: 5px;"></div>
    <div style="border-top:1px solid var(--border); padding-top:25px; margin-top: 10px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight: 800;">
            <span>الإجمالي النهائي:</span>
            <span id="ct3v" style="color:var(--accent3); font-size: 20px;">$0.00</span>
        </div>
        <button class="add-btn" onclick="goCheckout()" id="checkoutFinalBtn" style="height: 55px; font-size: 16px;">إتمام عملية الشراء ←</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // Configuration & State
    const RAILWAY_URL = 'https://bridgecards-api.onrender.com';
    const PROFIT_MARGIN = 1.10; // 10% Margin
    let lang = 'ar';
    let cart = [];

    // Smart Styling System (Replaces missing images)
    const PRODUCT_STYLING = {
        steam: { icon: '🎮', bg: 'linear-gradient(135deg, #1b2838, #2a475e)' },
        psn: { icon: '💙', bg: 'linear-gradient(135deg, #003087, #0070d1)' },
        xbox: { icon: '💚', bg: 'linear-gradient(135deg, #107c10, #52b043)' },
        amazon: { icon: '📦', bg: 'linear-gradient(135deg, #131921, #ff9900)' },
        netflix: { icon: '🎬', bg: 'linear-gradient(135deg, #e50914, #141414)' },
        apple: { icon: '🍎', bg: 'linear-gradient(135deg, #555, #000)' },
        google: { icon: '🤖', bg: 'linear-gradient(135deg, #4285f4, #34a853)' },
        visa: { icon: '💳', bg: 'linear-gradient(135deg, #1a1f71, #0057b7)' }
    };

    const P = [
        { id: 'steam', reloadlyId: 15803, cat: 'game', name: { ar: 'ستيم عالمي', en: 'Steam Global' }, price: 10 },
        { id: 'psn', reloadlyId: 15584, cat: 'game', name: { ar: 'بلايستيشن ستور', en: 'PSN Store' }, price: 20 },
        { id: 'amazon', reloadlyId: 5, cat: 'gift', name: { ar: 'أمازون أمريكي', en: 'Amazon US' }, price: 25 },
        { id: 'netflix', reloadlyId: 18681, cat: 'gift', name: { ar: 'نتفليكس', en: 'Netflix' }, price: 15 },
        { id: 'visa', reloadlyId: null, cat: 'prepaid', name: { ar: 'فيزا كارد', en: 'Visa Prepaid' }, price: 50 },
        { id: 'google', reloadlyId: 3941, cat: 'gift', name: { ar: 'جوجل بلاي', en: 'Google Play' }, price: 10 }
    ];

    function renderProducts() {
        const grid = document.getElementById('pgrid');
        grid.innerHTML = P.map(p => {
            const style = PRODUCT_STYLING[p.id] || { icon: '🎫', bg: 'var(--surface)' };
            return `
            <div class="pc">
                <div class="pc-head" style="background: ${style.bg}">
                    <div class="pc-icon-large">${style.icon}</div>
                </div>
                <div class="pc-body">
                    <div class="pc-name">${p.name[lang]}</div>
                    <div class="pc-price">$${p.price.toFixed(2)}</div>
                    <button class="add-btn" onclick="addCart('${p.id}')">${lang === 'ar' ? 'أضف للسلة +' : 'Add to Cart +'}</button>
                </div>
            </div>`;
        }).join('');
    }

    function addCart(id) {
        const p = P.find(item => item.id === id);
        cart.push({...p, cartId: Date.now()});
        updateUI();
        showToast(lang === 'ar' ? "✅ تمت الإضافة بنجاح" : "✅ Added to cart");
    }

    function updateUI() {
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('cart-nav-total').textContent = `$${total.toFixed(2)}`;
        document.getElementById('ct3v').textContent = `$${total.toFixed(2)}`;
        
        const list = document.getElementById('cartList');
        if(cart.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding:30px; color:var(--sub);">السلة فارغة</div>`;
        } else {
            list.innerHTML = cart.map((item, index) => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:var(--bg2); padding:12px; border-radius:10px; margin-bottom:10px; border:1px solid var(--border);">
                    <div style="font-weight:700;">${item.name[lang]}</div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="color:var(--accent3);">$${item.price.toFixed(2)}</span>
                        <button onclick="removeItem(${index})" style="background:none; border:none; color:var(--accent2); cursor:pointer;">✕</button>
                    </div>
                </div>
            `).join('');
        }
    }

    function removeItem(index) {
        cart.splice(index, 1);
        updateUI();
    }

    function toggleLang() {
        lang = lang === 'ar' ? 'en' : 'ar';
        document.getElementById('lang-lbl').textContent = lang === 'ar' ? 'EN' : 'عربي';
        document.getElementById('htmlRoot').dir = lang === 'ar' ? 'rtl' : 'ltr';
        renderProducts();
        updateUI();
    }

    function openCart() { 
        document.getElementById('cartDr').classList.add('open'); 
        document.getElementById('cartOv').classList.add('open');
    }
    function closeCart() { 
        document.getElementById('cartDr').classList.remove('open'); 
        document.getElementById('cartOv').classList.remove('open');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function syncPrices() {
        try {
            const res = await fetch(`${RAILWAY_URL}/api/products`);
            const data = await res.json();
            const liveData = data.content || data;
            P.forEach(localP => {
                if(localP.reloadlyId) {
                    const live = liveData.find(lp => lp.productId === localP.reloadlyId);
                    if (live && live.status === 'ACTIVE') {
                        localP.price = (live.minPrice || localP.price) * PROFIT_MARGIN;
                    }
                }
            });
            renderProducts();
        } catch (e) { console.log("Offline pricing active."); renderProducts(); }
    }

    function goCheckout() {
        if(cart.length === 0) return showToast("السلة فارغة!");
        showToast("⏳ جاري تحضير طلبك...");
        // Here you would redirect to your Stripe session
    }

    // Initialize App
    window.onload = () => {
        renderProducts();
        syncPrices();
    };
</script>

</body>
</html>
